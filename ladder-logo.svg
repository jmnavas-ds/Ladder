<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Ladder Logo — Two vertical rails with two horizontal rungs -->
  <!-- Style matches PAI logo: geometric blocks, navy/blue palette -->

  <!-- Left rail - top section (dark navy) -->
  <rect x="80" y="40" width="80" height="140" fill="#0a2463"/>
  <!-- Left rail - middle section (dark navy) -->
  <rect x="80" y="200" width="80" height="112" fill="#0a2463"/>
  <!-- Left rail - bottom section (dark navy) -->
  <rect x="80" y="332" width="80" height="140" fill="#0a2463"/>

  <!-- Right rail - top section (dark navy) -->
  <rect x="352" y="40" width="80" height="140" fill="#0a2463"/>
  <!-- Right rail - middle section (medium blue) -->
  <rect x="352" y="200" width="80" height="112" fill="#4a90d9"/>
  <!-- Right rail - bottom section (light blue) -->
  <rect x="352" y="332" width="80" height="140" fill="#93c5fd"/>

  <!-- Top rung (dark navy + blue gradient effect) -->
  <rect x="160" y="100" width="112" height="80" fill="#0a2463"/>
  <rect x="272" y="100" width="80" height="80" fill="#4a90d9"/>

  <!-- Bottom rung (medium blue + light blue) -->
  <rect x="160" y="332" width="112" height="80" fill="#4a90d9"/>
  <rect x="272" y="332" width="80" height="80" fill="#93c5fd"/>
</svg>
